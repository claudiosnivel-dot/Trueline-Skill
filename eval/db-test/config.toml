# =============================================================================
# eval/db-test/config.toml — configurazione Supabase locale per il banco di prova M-1
#
# Scopo: istanza Supabase locale usata per esercitare RLS a runtime (S5 e la
# verifica comportamentale di S3/S4). NON per produzione.
#
# Punta alle migration nella reference app: ../reference-app/supabase/migrations
# =============================================================================

[project]
id = "trueline-db-test"

[api]
port     = 54321
schemas  = ["public", "storage", "graphql_public"]

[db]
port        = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port    = 54323

[ingest]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup         = true
double_confirm_changes = true
enable_confirmations  = false

# Supabase CLI cerca le migration nella directory configurata sotto migrations_dir.
# Qui puntiamo all'unica source-of-truth delle migration: la reference app.
# Il path e relativo alla posizione di questo config.toml.
[db.migrations]
schema_migrations_table = "schema_migrations"

# NOTA: supabase CLI legge la directory delle migration dal file config.toml
# posizionato nella root del progetto supabase (tipicamente ./supabase/).
# Poiche questo config.toml sta in eval/db-test/, le migration vengono
# referenziate con un path relativo che risale a ../reference-app/supabase/migrations.
# All'avvio (up.sh / up.ps1) le migration vengono applicate con:
#   supabase db push --db-url <conn> --migrations-dir ../reference-app/supabase/migrations
# oppure copiando il link simbolico prima di "supabase start".
migrations_dir = "../reference-app/supabase/migrations"
